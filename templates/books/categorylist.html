{% extends "base.html" %}{% block content %}
<div class="d-flex justify-content-between mb-3"><h3>Categories</h3>
<a href="{% url 'books:category_add' %}" class="btn btn-primary"><i class="bi bi-plus"></i> Add</a></div>
<div class="card"><table class="table mb-0"><thead><tr><th>Name</th><th>Description</th><th></th></tr></thead><tbody>
{% for c in categories %}<tr><td>{{ c.name }}</td><td>{{ c.description }}</td>
<td><a href="{% url 'books:category_delete' c.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></td></tr>
{% empty %}<tr><td colspan="3" class="text-center text-muted">No categories</td></tr>{% endfor %}
</tbody></table></div>{% endblock %}
