{% extends "base.html" %}{% block title %}Register{% endblock %}
{% block auth %}
<div class="auth-card">
  <h5 class="mb-3">Create your account</h5>
  <form method="post">{% csrf_token %}
    {% for f in form %}
      <div class="mb-3"><label class="form-label">{{ f.label }}</label>{{ f }}{% if f.errors %}<div class="text-danger small">{{ f.errors|join:", " }}</div>{% endif %}</div>
    {% endfor %}
    <button class="btn btn-primary w-100">Register</button>
  </form>
  <div class="text-center mt-3 small">Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a></div>
</div>
{% endblock %}
